name: Docker Build and Push to Azure

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to Azure Container Registry
      # It uses the secrets you will add to GitHub settings
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: edailmsregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build and Push the Docker Image
      # This time 'push' is set to true!
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: edailmsregistry.azurecr.io/edai-lms:latest
