name: Docker Build Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out the code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (allows for advanced build features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build the Docker Image
      # This will run your Dockerfile just like it does on your computer.
      # It ensures your code is always "buildable".
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false # We set this to false for now until you have a registry (like Docker Hub)
          tags: edai-lms:latest
          # We don't need real secrets here because our Dockerfile 
          # uses those "dummy" values we added for the build phase!
